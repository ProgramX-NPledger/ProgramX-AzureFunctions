# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - fa-programx

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'ProgramX.Azure.FunctionApp' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '9.0.x' # set this to the dotnet version to use
  GIT_COMMIT_SHA: ${{ github.sha }}
  BUILD_NUMBER: ${{ github.run_number }}
  DEPLOYED_AT: ${{ github.event.head_commit.timestamp }}

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action' 
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: directory
        shell: pwsh
        run: |
          ls

      - name: Set version information
        shell: pwsh
        run: |
          $text = Get-Content -Raw appsettings.json
          $text = $text -replace '\[\[GITHUB_COMMIT_API\]\]', '${{ env.GIT_COMMIT_SHA }}'
          $text = $text -replace '\[\[GITHUB_BUILD_API\]\]', '${{ env.BUILD_NUMBER }}'
          $text = $text -replace '\[\[GITHUB_DATE_API\]\]', '${{ env.DEPLOYED_AT }}'
          Set-Content -Path appsettings.json -Value $text -Encoding utf8

      - name: 'Build'
        working-directory: ./ProgramX.Azure.FunctionApp
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B11CEB1F20914D5C8ED4FEE74AD8E500 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B99F2F4C48C4990BBBA16E1419B4DE6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A7F0747C32CF4301979B23E995724383 }}

      - name: 'Deploy Azure Functions App to Staging'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'fa-programx'
          slot-name: 'staging'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ProgramX.Azure.FunctionApp/output'
    
      - name: 'Deploy Azure Functions App to Production'
        uses: Azure/functions-action@v1
        id: faenv
        with:
          app-name: 'fa-programx'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ProgramX.Azure.FunctionApp/output'

  
          












